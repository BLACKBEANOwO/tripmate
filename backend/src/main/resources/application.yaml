spring:
  datasource:
    # 환경변수가 있으면 그 값을, 없으면 콜론 뒤 기본값(로컬 개발용)을 사용합니다.
    # → AWS 배포 시 코드 수정 없이 환경변수/Secrets만 주입하면 됩니다 (Phase 7).
    url: jdbc:postgresql://localhost:5432/${DB_NAME:tripmate}
    username: ${DB_USERNAME:tripmate}
    password: ${DB_PASSWORD:tripmate1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # 테이블은 db/init/01-schema.sql 로 이미 만들었으므로 JPA가 손대지 않게 함.
      # validate = 엔티티와 실제 테이블이 일치하는지 "검증만" (자동 생성/수정 X).
      ddl-auto: validate
    show-sql: true            # 실행되는 SQL을 콘솔에 출력 (학습용)
    properties:
      hibernate:
        format_sql: true      # SQL 보기 좋게 들여쓰기
    open-in-view: false       # 권장 설정 (지연 로딩 관련 안티패턴 방지)

jwt:
  # 로컬 개발용 기본값. 프로덕션에서는 반드시 환경변수로 주입할 것.
  # 최소 256bit(32바이트) 이상이어야 HS256 서명 가능.
  secret: ${JWT_SECRET:tripmate-dev-secret-key-must-be-at-least-32-bytes!!}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}  # 24시간

server:
  port: 8080
  error:
    # ResponseStatusException 등에 담은 사용자용 메시지를 응답 본문에 포함.
    # 기본값은 never(보안상 숨김)지만, 우리가 의도적으로 던진 메시지는 노출이 맞다.
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info  # /actuator/health 노출 (나중에 prometheus 추가)